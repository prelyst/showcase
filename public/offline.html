<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Showcase</title>
    <style>
      :root { color-scheme: light dark; }
      * { margin: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, 'Times New Roman', serif;
        color: #211c15;
        background: #ffffff;
        text-align: center;
        padding: 2rem;
      }
      .mark { width: 16px; height: 16px; border-radius: 4px; background: #b8541f; transform: rotate(45deg); margin: 0 auto 1.5rem; }
      h1 { font-size: 1.9rem; font-style: italic; letter-spacing: -0.02em; margin-bottom: 0.6rem; }
      p { font-family: system-ui, sans-serif; color: #5a5142; max-width: 22rem; line-height: 1.5; margin: 0 auto 1.5rem; }
      a {
        font-family: system-ui, sans-serif; font-size: 0.85rem; text-decoration: none;
        background: #b8541f; color: #fff; padding: 0.7rem 1.2rem; border-radius: 999px;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #f2e9dc; background: #1a1510; }
        p { color: #c3b6a3; }
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark"></div>
      <h1>You're offline</h1>
      <p>Showcase can't reach the network right now. Check your connection — your draft work is safe.</p>
      <a href="/showcase/feed">Try again</a>
    </div>
  </body>
</html>
